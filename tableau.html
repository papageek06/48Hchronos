<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaGo - Tableau periodique</title>
  <link rel="stylesheet" href="tableau.css" />
</head>
<body>
  <main class="page">
    <div class="background-shape background-shape-left" aria-hidden="true"></div>
    <div class="background-shape background-shape-right" aria-hidden="true"></div>

    <div class="content">
      <section class="selection-panel" aria-labelledby="selection-title">
        <div class="selection-header">
          <div>
            <h2 id="selection-title">Selection actuelle</h2>
          </div>
          <button id="resetSelection" class="reset-button" type="button">Reinitialiser</button>
        </div>

        <div id="assembledWord" class="assembled-word" aria-live="polite">...</div>
        <p id="selectionMeta" class="selection-meta">Aucun element selectionne.</p>

        <div id="selectedList" class="selected-list" aria-live="polite">
          <span class="empty-selection">Les symboles choisis s'afficheront ici.</span>
        </div>
      </section>

      <section class="table-shell">
        <div class="table-scroll" aria-label="Zone scrollable du tableau periodique">
          <div id="periodicTable" class="periodic-table" role="grid" aria-label="Tableau periodique des elements"></div>
        </div>
      </section>
    </div>

    <div id="successMessage" class="success-message" hidden aria-live="assertive">
      <div class="success-card">
        <p class="success-kicker">Objet trouve</p>
        <h2>Vous avez trouve le SIPHON</h2>
        <p>
          Cet objet vous servira pour arreter la fuite d'eau.
        </p>
      </div>
    </div>
  </main>

  <script src="game-state.js"></script>
  <script>
    (() => {
      const game = window.GameState;
      if (!game) return;
      game.requireStartedOrRedirect();
      game.redirectIfGameOver();
      setInterval(() => game.redirectIfGameOver(), 1000);
    })();
  </script>
  <script src="water-overlay.js"></script>
  <script src="tableau.js" defer></script>
</body>
</html>
