<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaGo - Recherche</title>
  <style>
    :root {
      --bg: #eef8ff;
      --card: rgba(255, 255, 255, 0.92);
      --text: #034e7b;
      --accent: #0b78d1;
      --shadow: 0 20px 60px rgba(2, 65, 102, 0.16);
      --danger: #d93f3f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #c6e8ff 0%, #eef8ff 30%, #dceefd 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .page {
      width: min(100%, 920px);
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,252,255,0.96));
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 60px 36px 48px;
      position: relative;
      overflow: hidden;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: #07689f;
      margin-bottom: 12px;
    }

    .logo span {
      color: #0b78d1;
    }

    .subtitle {
      color: #1f4f7b;
      margin-bottom: 42px;
      font-size: 1.05rem;
    }

    .search-card {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 24px;
      max-width: 720px;
    }

    .search-card input {
      flex: 1;
      min-width: 0;
      border: 2px solid rgba(3, 78, 123, 0.16);
      border-radius: 999px;
      padding: 18px 22px;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: rgba(255, 255, 255, 0.9);
    }

    .search-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 6px rgba(11, 120, 209, 0.12);
    }

    .search-card button {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 0 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .search-card button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .hint {
      display: inline-block;
      background: rgba(11, 120, 209, 0.1);
      color: #114c72;
      border: 1px solid rgba(11, 120, 209, 0.18);
      padding: 14px 20px;
      border-radius: 24px;
      font-size: 0.98rem;
      line-height: 1.5;
      max-width: 720px;
      margin: 0 auto;
    }

    .hidden {
      display: none;
    }

    .result {
      margin-top: 24px;
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(3, 78, 123, 0.12);
      background: rgba(255, 255, 255, 0.9);
    }

    .result h2 {
      font-size: 1.35rem;
      margin-bottom: 12px;
    }

    .result p {
      line-height: 1.7;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      padding: 14px 22px;
      color: white;
      background: #0b78d1;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }

    .footer {
      margin-top: 42px;
      font-size: 0.95rem;
      color: #386a8c;
    }

    .wave {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(11, 120, 209, 0.09);
      top: -60px;
      right: -60px;
      filter: blur(1px);
    }

    .wave.two {
      bottom: -80px;
      left: -70px;
      top: auto;
      right: auto;
      background: rgba(3, 78, 123, 0.08);
    }

    .alert {
      color: var(--danger);
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wave"></div>
    <div class="wave two"></div>
    <div class="logo">Aqua<span>Go</span></div>
    <div class="subtitle">Entrez une piste et trouvez la sortie du labyrinthe aquatique.</div>

    <div class="search-card">
      <input id="searchInput" type="text" placeholder="Rechercher... ex: source, vague, rivière" autocomplete="off" />
      <button id="searchButton">Chercher</button>
    </div>

    <div class="hint">Indice : il faut penser à l’eau qui coule vers la sortie. Tape un mot en rapport avec la source ou la mer.</div>

    <div id="message" class="result hidden"></div>

    <div class="footer">
      AquaGo est un moteur fictif d’évasion. Commencez par une recherche et suivez les indices pour trouver la sortie.
    </div>
  </div>

  <script>
    const searchButton = document.getElementById('searchButton');
    const searchInput = document.getElementById('searchInput');
    const messageBox = document.getElementById('message');

    const answers = {
      eau: 'L’eau est partout dans ce jeu. Continue, la sortie est cachée dans un mot plus précis.',
      source: 'Bravo ! Tu trouves la source. Tu es proche de la sortie. Cherche le passage vers la mer.',
      mer: 'Super ! La mer est la sortie du labyrinthe. Clique sur le lien pour t’échapper.',
      rivière: 'La rivière te guide. La prochaine étape est de suivre le courant jusqu’à la mer.',
      courant: 'Le courant te pousse vers la sortie. Encore un effort, cherche la mer.'
    };

    function showMessage(html, isSuccess = false) {
      messageBox.innerHTML = html;
      messageBox.classList.remove('hidden');
      messageBox.style.borderColor = isSuccess ? '#0b78d1' : 'rgba(3, 78, 123, 0.12)';
    }

    function search() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) {
        showMessage('<h2>Rien saisi...</h2><p>Commence par taper un mot lié à l’eau : source, rivière, mer, vague.</p>');
        return;
      }

      if (answers[query]) {
        const response = answers[query];
        const success = query === 'mer';
        const buttonHtml = success ? '<a class="link-button" href="#" onclick="alert(\'Sortie trouvée ! Tu as échappé au labyrinthe aquatique.\');return false;">Sortie</a>' : '';
        showMessage('<h2>Résultat</h2><p>' + response + '</p>' + buttonHtml, success);
      } else {
        showMessage('<h2>Aucune réponse</h2><p>Ce mot ne correspond pas à l’indice. Essaie un autre terme lié à l’eau.</p>');
      }
    }

    searchButton.addEventListener('click', search);
    searchInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        search();
      }
    });
  </script>
</body>
</html>
