<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaGo - Recherche</title>
  <style>
    :root {
      --bg: #eef8ff;
      --card: rgba(255, 255, 255, 0.92);
      --text: #034e7b;
      --accent: #0b78d1;
      --shadow: 0 20px 60px rgba(2, 65, 102, 0.16);
      --danger: #d93f3f;
      --water: rgba(30, 144, 255, 0.22);
      --water-deep: rgba(0, 90, 200, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      background: var(--bg);
    }

    .page {
      width: 100%;
      max-width: none;
      min-height: 100vh;
      text-align: center;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.72),
        rgba(245, 252, 255, 0.62)
      );
      backdrop-filter: blur(8px) saturate(1.05);
      -webkit-backdrop-filter: blur(8px) saturate(1.05);
      padding: clamp(28px, 6vh, 72px) clamp(18px, 5vw, 64px);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: #07689f;
      margin-bottom: 12px;
    }

    .logo span {
      color: #0b78d1;
    }

    .subtitle {
      color: #1f4f7b;
      margin-bottom: 42px;
      font-size: 1.05rem;
    }

    .search-card {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 24px;
      width: min(100%, 980px);
      max-width: none;
    }

    .search-card input {
      flex: 1;
      min-width: 0;
      border: 2px solid rgba(3, 78, 123, 0.16);
      border-radius: 999px;
      padding: 18px 22px;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: rgba(255, 255, 255, 0.9);
    }

    .search-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 6px rgba(11, 120, 209, 0.12);
    }

    .search-card button {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 0 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .search-card button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .hidden {
      display: none;
    }

    .result {
      margin-top: 24px;
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(3, 78, 123, 0.12);
      background: rgba(255, 255, 255, 0.9);
    }

    .result h2 {
      font-size: 1.35rem;
      margin-bottom: 12px;
    }

    .result p {
      line-height: 1.7;
    }

    .footer {
      margin-top: 42px;
      font-size: 0.95rem;
      color: #386a8c;
    }

    .wave {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(11, 120, 209, 0.09);
      top: -60px;
      right: -60px;
      filter: blur(1px);
    }

    .wave.two {
      bottom: -80px;
      left: -70px;
      top: auto;
      right: auto;
      background: rgba(3, 78, 123, 0.08);
    }

    .alert {
      color: var(--danger);
      margin-top: 18px;
    }
  </style>
  <script src="./water-overlay.js" defer></script>
</head>
<body>
  <div class="page">
    <div class="wave"></div>
    <div class="wave two"></div>
    <div class="content">
      <div class="logo">Aqua<span>Go</span></div>
      <div class="subtitle">Recherchez un mot-clé.</div>

      <div class="search-card">
        <input id="searchInput" type="text" placeholder="Rechercher... ex: cadenas, lock, combat" autocomplete="off" />
        <button id="searchButton">Chercher</button>
      </div>

      <div id="message" class="result hidden"></div>

      <div class="footer">
        AquaGo — page de recherche.
      </div>
    </div>
  </div>

  <script>
    const searchButton = document.getElementById('searchButton');
    const searchInput = document.getElementById('searchInput');
    const messageBox = document.getElementById('message');
    const routes = {
      lock: 'lock.html',
      cadenas: 'lock.html',
      enigme: 'lock.html',
      combat: 'combat.html',
      arene: 'combat.html',
      pokemon: 'combat.html'
    };

    const normalizeQuery = value => value
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');

    function showMessage(html, isSuccess = false) {
      messageBox.innerHTML = html;
      messageBox.classList.remove('hidden');
      messageBox.style.borderColor = isSuccess ? '#0b78d1' : 'rgba(3, 78, 123, 0.12)';
    }

    function search() {
      const query = normalizeQuery(searchInput.value);
      if (!query) {
        showMessage('<h2>Rien saisi</h2><p>Entrez un mot-clé pour lancer la recherche.</p>');
        return;
      }

      const target = routes[query];
      if (target) {
        const pretty = query.replaceAll('<', '&lt;').replaceAll('>', '&gt;');
        showMessage('<h2>Navigation</h2><p>Ouverture de la page : <strong>' + target + '</strong> (mot-clé : ' + pretty + ')</p>', true);
        window.location.href = target;
        return;
      }

      const pretty = query.replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      showMessage('<h2>Aucun résultat</h2><p>Aucune page associée à <strong>' + pretty + '</strong>. Essaie : cadenas, lock, combat, arène, pokemon.</p>');
    }

    searchButton.addEventListener('click', search);
    searchInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        search();
      }
    });
  </script>
</body>
</html>
