<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaGo - Recherche</title>
  <style>
    :root {
      --bg: #eef8ff;
      --card: rgba(255, 255, 255, 0.92);
      --text: #034e7b;
      --accent: #0b78d1;
      --shadow: 0 20px 60px rgba(2, 65, 102, 0.16);
      --danger: #d93f3f;
      --water: rgba(30, 144, 255, 0.22);
      --water-deep: rgba(0, 90, 200, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      background: var(--bg);
    }

    #water {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      z-index: 1;
    }

    .page {
      width: 100%;
      max-width: none;
      min-height: 100vh;
      text-align: center;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.72),
        rgba(245, 252, 255, 0.62)
      );
      backdrop-filter: blur(8px) saturate(1.05);
      -webkit-backdrop-filter: blur(8px) saturate(1.05);
      padding: clamp(28px, 6vh, 72px) clamp(18px, 5vw, 64px);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: #07689f;
      margin-bottom: 12px;
    }

    .logo span {
      color: #0b78d1;
    }

    .subtitle {
      color: #1f4f7b;
      margin-bottom: 42px;
      font-size: 1.05rem;
    }

    .search-card {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 24px;
      width: min(100%, 980px);
      max-width: none;
    }

    .search-card input {
      flex: 1;
      min-width: 0;
      border: 2px solid rgba(3, 78, 123, 0.16);
      border-radius: 999px;
      padding: 18px 22px;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: rgba(255, 255, 255, 0.9);
    }

    .search-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 6px rgba(11, 120, 209, 0.12);
    }

    .search-card button {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 0 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .search-card button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .hidden {
      display: none;
    }

    .result {
      margin-top: 24px;
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(3, 78, 123, 0.12);
      background: rgba(255, 255, 255, 0.9);
    }

    .result h2 {
      font-size: 1.35rem;
      margin-bottom: 12px;
    }

    .result p {
      line-height: 1.7;
    }

    .footer {
      margin-top: 42px;
      font-size: 0.95rem;
      color: #386a8c;
    }

    .wave {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(11, 120, 209, 0.09);
      top: -60px;
      right: -60px;
      filter: blur(1px);
    }

    .wave.two {
      bottom: -80px;
      left: -70px;
      top: auto;
      right: auto;
      background: rgba(3, 78, 123, 0.08);
    }

    .alert {
      color: var(--danger);
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="page">
    <canvas id="water" aria-hidden="true"></canvas>
    <div class="wave"></div>
    <div class="wave two"></div>
    <div class="content">
      <div class="logo">Aqua<span>Go</span></div>
      <div class="subtitle">Recherchez un mot-clé.</div>

      <div class="search-card">
        <input id="searchInput" type="text" placeholder="Rechercher... ex: source, vague, rivière" autocomplete="off" />
        <button id="searchButton">Chercher</button>
      </div>

      <div id="message" class="result hidden"></div>

      <div class="footer">
        AquaGo — page de recherche.
      </div>
    </div>
  </div>

  <script>
    (() => {
      const DURATION_MS = 12 * 60_000;

      const canvas = document.getElementById('water');
      const ctx = canvas.getContext('2d', { alpha: true });
      if (!ctx) return;

      const DPR = () => Math.max(1, Math.min(2, window.devicePixelRatio || 1));

      let w = 0;
      let h = 0;
      let dpr = DPR();
      let start = performance.now();

      const resize = () => {
        dpr = DPR();
        w = Math.floor(window.innerWidth);
        h = Math.floor(window.innerHeight);
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };

      window.addEventListener('resize', resize, { passive: true });
      resize();

      const cssVar = (name, fallback) => {
        const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        return value || fallback;
      };

      const draw = (now) => {
        const elapsed = now - start;
        const t = Math.min(1, elapsed / DURATION_MS);

        ctx.clearRect(0, 0, w, h);

        const waterY = h * (1 - t);

        const time = elapsed / 1000;
        const baseAmp = Math.max(6, Math.min(18, h * 0.02));
        const amp = baseAmp * (0.55 + 0.45 * (1 - Math.pow(1 - t, 2)));
        const speed = 0.9;
        const wl1 = Math.max(220, w * 0.35);
        const wl2 = Math.max(120, w * 0.18);

        const grad = ctx.createLinearGradient(0, waterY, 0, h);
        grad.addColorStop(0, cssVar('--water', 'rgba(30, 144, 255, 0.22)'));
        grad.addColorStop(1, cssVar('--water-deep', 'rgba(0, 90, 200, 0.28)'));

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, h);
        ctx.lineTo(0, waterY);

        const step = Math.max(6, Math.floor(w / 140));
        for (let x = 0; x <= w + step; x += step) {
          const y =
            waterY +
            Math.sin((x / wl1) * Math.PI * 2 + time * speed) * amp +
            Math.sin((x / wl2) * Math.PI * 2 - time * speed * 1.3) * (amp * 0.45) +
            Math.sin((x / (wl2 * 0.62)) * Math.PI * 2 + time * speed * 1.9) * (amp * 0.18);
          ctx.lineTo(x, y);
        }

        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = 'rgba(0, 120, 255, 0.18)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = 0; x <= w + step; x += step) {
          const y =
            waterY +
            Math.sin((x / wl1) * Math.PI * 2 + time * speed) * (amp * 0.8) +
            Math.sin((x / wl2) * Math.PI * 2 - time * speed * 1.3) * (amp * 0.25);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();

        requestAnimationFrame(draw);
      };

      requestAnimationFrame(draw);
    })();

    const searchButton = document.getElementById('searchButton');
    const searchInput = document.getElementById('searchInput');
    const messageBox = document.getElementById('message');

    function showMessage(html, isSuccess = false) {
      messageBox.innerHTML = html;
      messageBox.classList.remove('hidden');
      messageBox.style.borderColor = isSuccess ? '#0b78d1' : 'rgba(3, 78, 123, 0.12)';
    }

    function search() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) {
        showMessage('<h2>Rien saisi</h2><p>Entrez un mot-clé pour lancer la recherche.</p>');
        return;
      }

      const pretty = query.replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      showMessage('<h2>Résultat</h2><p>Recherche effectuée pour : <strong>' + pretty + '</strong></p>', true);
    }

    searchButton.addEventListener('click', search);
    searchInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        search();
      }
    });
  </script>
</body>
</html>
